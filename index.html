<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Baccarat Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: #f8fafc; }
        
        /* ปรับ Roadmap ให้ชิดกันมากที่สุดตามรูปตัวอย่าง */
        .bead-plate { 
            display: grid; 
            grid-template-rows: repeat(6, 1fr); 
            grid-auto-flow: column; 
            gap: 1px; /* ชิดกันมากที่สุด */
            overflow-x: auto; 
            padding: 4px; 
            background: #111827; 
            border: 1px solid #374151;
            border-radius: 4px; 
            min-height: 160px;
            width: 100%;
        }
        
        .bead { 
            width: 24px; 
            height: 24px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: bold; 
            color: white; 
            flex-shrink: 0;
            margin: 1px;
        }
        
        .bg-player { background-color: #2563eb; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        .bg-banker { background-color: #dc2626; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        .bg-tie { background-color: #16a34a; box-shadow: inset 0 0 4px rgba(0,0,0,0.5); }
        
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        .bead-plate::-webkit-scrollbar { height: 4px; }
        .bead-plate::-webkit-scrollbar-track { background: #111827; }
        .bead-plate::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 2px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-yellow-500 mb-1 italic uppercase tracking-widest">AI BACCARAT PREDICTOR</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-tighter">Real-time Statistical Engine v2.5</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Left Column -->
            <div class="md:col-span-1 space-y-4">
                <!-- Prediction Box -->
                <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 shadow-xl">
                    <h2 class="text-xs font-semibold mb-3 text-slate-400 uppercase tracking-widest">Prediction</h2>
                    <div id="next-prediction" class="text-center py-4 min-h-[70px] flex flex-col items-center justify-center">
                        <span class="text-slate-500 text-xs italic">Wating for data...</span>
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between text-[10px] mb-1">
                            <span class="text-slate-500">CONFIDENCE</span>
                            <span id="confidence-pct" class="text-yellow-500 font-bold">0%</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                            <div id="confidence-bar" class="bg-yellow-500 h-full transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Money Management -->
                <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 shadow-xl">
                    <h2 class="text-xs font-semibold mb-3 text-slate-400 uppercase tracking-widest">Betting Plan</h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end border-b border-slate-700 pb-2">
                            <span class="text-slate-400 text-xs">STEP:</span>
                            <span id="step-count" class="text-xl font-bold text-white leading-none">1</span>
                        </div>
                        <div class="flex justify-between items-end border-b border-slate-700 pb-2">
                            <span class="text-slate-400 text-xs">AMOUNT:</span>
                            <span id="bet-amount" class="text-xl font-bold text-yellow-400 leading-none">100.00</span>
                        </div>
                        <button onclick="resetStep()" class="w-full py-2 bg-slate-700/50 hover:bg-slate-700 text-slate-300 rounded-lg text-[10px] font-bold transition-all uppercase tracking-widest">
                            Reset Step
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="md:col-span-2 space-y-4">
                <!-- Roadmap -->
                <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 shadow-inner">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Roadmap (Bead Plate)</h2>
                        <span id="total-hands" class="text-[10px] text-slate-600 font-bold">TOTAL: 0</span>
                    </div>
                    <div id="road-map" class="bead-plate">
                        <!-- Beads generated here -->
                    </div>
                </div>

                <!-- Input Buttons -->
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 shadow-xl">
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="record('P')" class="bg-blue-600 hover:bg-blue-700 text-white py-12 rounded-xl font-black text-2xl shadow-lg active:scale-95 transition-all">P</button>
                        <button onclick="record('T')" class="bg-green-600 hover:bg-green-700 text-white py-12 rounded-xl font-black text-2xl shadow-lg active:scale-95 transition-all">T</button>
                        <button onclick="record('B')" class="bg-red-600 hover:bg-red-700 text-white py-12 rounded-xl font-black text-2xl shadow-lg active:scale-95 transition-all">B</button>
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button onclick="undo()" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-slate-300 text-xs font-bold transition-all">
                            UNDO
                        </button>
                        <button onclick="clearHistory()" class="flex-1 py-3 bg-red-900/30 hover:bg-red-600 border border-red-500/30 rounded-lg text-red-200 text-xs font-bold transition-all">
                            CLEAR ALL
                        </button>
                    </div>
                </div>

                <!-- Score Counter -->
                <div class="flex gap-4">
                    <div class="flex-1 bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-center">
                        <div class="text-blue-500 text-lg font-black" id="p-count">0</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase">Player</div>
                    </div>
                    <div class="flex-1 bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-center">
                        <div class="text-green-500 text-lg font-black" id="t-count">0</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase">Tie</div>
                    </div>
                    <div class="flex-1 bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-center">
                        <div class="text-red-500 text-lg font-black" id="b-count">0</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase">Banker</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];
        let currentStep = 1;
        let lastPredictedSide = null;
        const baseBet = 100;

        function record(result) {
            // ระบบเดินเงินอัตโนมัติ
            if (lastPredictedSide && result !== 'T') {
                if (result === lastPredictedSide) {
                    currentStep = 1; 
                } else {
                    currentStep = (currentStep >= 8) ? 1 : currentStep + 1;
                }
            }

            history.push(result);
            updateUI();
        }

        function undo() {
            if (history.length > 0) {
                history.pop();
                if (currentStep > 1) currentStep--;
                updateUI();
            }
        }

        // แก้ไขฟังก์ชันล้างข้อมูลให้ทำงานทันที 100%
        function clearHistory() {
            if (history.length === 0) return;

            if(confirm('ยืนยันการล้างข้อมูลและประวัติทั้งหมด?')) {
                // 1. ล้างตัวแปร Logic
                history = [];
                currentStep = 1;
                lastPredictedSide = null;
                
                // 2. ล้าง HTML Elements โดยตรงทันที
                const roadMap = document.getElementById('road-map');
                const predictionBox = document.getElementById('next-prediction');
                const confidencePct = document.getElementById('confidence-pct');
                const confidenceBar = document.getElementById('confidence-bar');
                
                roadMap.innerHTML = '';
                predictionBox.innerHTML = '<span class="text-slate-500 text-xs italic">Waiting for data...</span>';
                confidencePct.innerText = '0%';
                confidenceBar.style.width = '0%';
                
                // 3. อัปเดตส่วนอื่นๆ
                updateStats();
                updateMoneyManagement();
                document.getElementById('total-hands').innerText = 'TOTAL: 0';
            }
        }

        function resetStep() {
            currentStep = 1;
            updateMoneyManagement();
        }

        function updateUI() {
            renderRoadmap();
            updateStats();
            updateMoneyManagement();
            calculatePrediction();
        }

        function renderRoadmap() {
            const roadMap = document.getElementById('road-map');
            roadMap.innerHTML = ''; // ล้างของเก่าก่อนวาดใหม่
            
            history.forEach(res => {
                const bead = document.createElement('div');
                bead.className = `bead ${res === 'P' ? 'bg-player' : (res === 'B' ? 'bg-banker' : 'bg-tie')}`;
                bead.innerText = res;
                roadMap.appendChild(bead);
            });
            
            // สั่งให้เลื่อนไปขวาสุดเสมอ
            setTimeout(() => {
                roadMap.scrollLeft = roadMap.scrollWidth;
            }, 0);

            document.getElementById('total-hands').innerText = `TOTAL: ${history.length}`;
        }

        function updateStats() {
            document.getElementById('p-count').innerText = history.filter(x => x === 'P').length;
            document.getElementById('b-count').innerText = history.filter(x => x === 'B').length;
            document.getElementById('t-count').innerText = history.filter(x => x === 'T').length;
        }

        function updateMoneyManagement() {
            const multiplier = Math.pow(2, currentStep - 1);
            const bet = baseBet * multiplier;
            document.getElementById('step-count').innerText = currentStep;
            document.getElementById('bet-amount').innerText = bet.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function calculatePrediction() {
            const display = document.getElementById('next-prediction');
            const confPct = document.getElementById('confidence-pct');
            const confBar = document.getElementById('confidence-bar');

            if (history.length < 3) return;

            let pred = "P";
            let confidence = 50;
            const lastThree = history.slice(-3).join('');
            
            // Simple logic for illustration
            if (lastThree === 'BBB') { pred = 'P'; confidence = 85; }
            else if (lastThree === 'PPP') { pred = 'B'; confidence = 85; }
            else if (lastThree.includes('PBP')) { pred = 'B'; confidence = 65; }
            else {
                pred = Math.random() > 0.5 ? 'P' : 'B';
                confidence = Math.floor(Math.random() * 20) + 50;
            }

            lastPredictedSide = pred;
            const colorClass = pred === 'P' ? 'text-blue-500' : 'text-red-500';
            display.innerHTML = `
                <span class="text-[10px] text-slate-400 font-bold mb-1">NEXT SIDE</span>
                <span class="text-3xl font-black ${colorClass} pulse tracking-widest">${pred === 'P' ? 'PLAYER' : 'BANKER'}</span>
            `;
            confPct.innerText = `${confidence}%`;
            confBar.style.width = `${confidence}%`;
        }
    </script>
</body>
</html>
